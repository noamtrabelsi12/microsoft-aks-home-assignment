nameOverride: ""
fullnameOverride: ""

namespace: default

ingress:
  enabled: true
  className: nginx
  host: ""
  annotations: {}
  paths:
    serviceA: /service-a
    serviceB: /service-b

serviceA:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/noamtrabelsi12/service-a
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  containerPort: 3000

  service:
    type: ClusterIP
    port: 80

  env:
    PORT: "3000"
    BTC_POLL_INTERVAL_MS: "60000"
    BTC_AVERAGE_INTERVAL_MS: "600000"
    BTC_MAX_SAMPLES: "10"
    BTC_REQUEST_TIMEOUT_MS: "10000"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

  livenessProbe:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

serviceB:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/noamtrabelsi12/service-b
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  containerPort: 3000

  service:
    type: ClusterIP
    port: 80

  env:
    PORT: "3000"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

  livenessProbe:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

networkPolicy:
  enabled: true
  allowIngressFromNginxToServiceB: true
