{{- if .Values.serviceB.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: service-b-route
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "btc-platform.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.serviceB.pathPrefix }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .Values.routes.serviceB.rewritePrefix }}
      backendRefs:
        - name: {{ include "btc-platform.serviceBName" . }}
          port: {{ .Values.serviceB.service.port }}
{{- end }}