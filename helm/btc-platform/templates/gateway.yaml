{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "btc-platform.labels" . | nindent 4 }}
  annotations:
    alb.networking.azure.io/alb-namespace: {{ .Values.gateway.alb.namespace | quote }}
    alb.networking.azure.io/alb-name: {{ .Values.gateway.alb.name | quote }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
{{- end }}