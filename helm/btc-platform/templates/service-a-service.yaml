{{- if .Values.serviceA.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "btc-platform.serviceAName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "btc-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-a
spec:
  type: {{ .Values.serviceA.service.type }}
  selector:
    {{- include "btc-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: service-a
  ports:
    - name: http
      port: {{ .Values.serviceA.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}