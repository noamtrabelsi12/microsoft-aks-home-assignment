{{- if .Values.serviceB.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "btc-platform.serviceBName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "btc-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: service-b
spec:
  type: {{ .Values.serviceB.service.type }}
  selector:
    {{- include "btc-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: service-b
  ports:
    - name: http
      port: {{ .Values.serviceB.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}